<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solana Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; min-height: 100%;
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 80px;
      padding-bottom: 200px;
      padding-left: 16px;
      padding-right: 16px;
    }

    #card {
      border: 1.5px solid #000;
      padding: 28px 32px 32px;
      width: min(760px, 100%);
      flex-shrink: 0;
    }

    #card-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #000;
      margin-bottom: 18px;
      display: block;
    }

    #wallet {
      display: block;
      width: 100%;
      font-family: 'SF Mono', ui-monospace, 'Fira Code', 'Courier New', monospace;
      font-size: 13px;
      color: #aaa;
      background: transparent;
      border: none;
      border-bottom: 1px solid #ccc;
      padding: 4px 0 8px;
      outline: none;
      letter-spacing: 0.01em;
      transition: border-color 0.15s, color 0.15s;
    }

    #wallet.active {
      color: #000;
      border-bottom-color: #000;
    }

    #wallet::selection { background: #000; color: #fff; }

    #enter {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 10px 0;
      background: #000;
      color: #fff;
      border: none;
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s;
    }

    #enter:hover  { background: #333; }
    #enter:active { background: #000; }

    /* ── Side-by-side panel row ─────────────────────────────────────────────── */
    #panels {
      display: flex;
      gap: 16px;
      width: min(1200px, 100%);
      margin-top: 16px;
      align-items: stretch;
    }

    @media (max-width: 768px) {
      html, body { padding-top: 32px; }
      #panels { flex-direction: column; }
      #bubble-canvas { height: 360px; }
    }

    /* ── Terminal ───────────────────────────────────────────────────────────── */
    #terminal {
      flex: 1;
      min-width: 0;
      border: 1.5px solid #000;
      padding: 20px 24px;
    }

    #terminal-title {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #000;
      margin-bottom: 10px;
    }

    #output {
      font-family: 'SF Mono', ui-monospace, 'Fira Code', 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.75;
      color: #000;
      white-space: pre;
      overflow-x: auto;
      max-height: 540px;
      overflow-y: auto;
    }

    #output .muted { color: #aaa; }

    #show-all {
      display: none;
      margin-top: 12px;
      padding: 6px 0;
      width: 100%;
      background: transparent;
      border: 1px solid #000;
      font-family: inherit;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      color: #000;
    }
    #show-all:hover { background: #f5f5f5; }

    /* ── Bubble map ─────────────────────────────────────────────────────────── */
    #bubble-wrap {
      flex: 1;
      min-width: 0;
      border: 1.5px solid #000;
    }

    #bubble-label {
      display: block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #000;
      padding: 14px 24px 0;
    }

    #bubble-placeholder {
      padding: 20px 24px;
      font-family: 'SF Mono', ui-monospace, 'Fira Code', 'Courier New', monospace;
      font-size: 12px;
      color: #aaa;
    }

    #bubble-canvas {
      display: none;
      width: 100%;
      height: 500px;
      cursor: pointer;
    }

    #token-detail {
      display: none;
      border-top: 1px solid #e8e8e8;
      padding: 16px 24px 20px;
    }

    #token-detail-name {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #000;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 4px 20px;
      font-family: 'SF Mono', ui-monospace, 'Fira Code', 'Courier New', monospace;
      font-size: 11px;
    }

    .detail-grid .label { color: #aaa; }
    .detail-grid .value { color: #000; }

    /* ── Summary bar ────────────────────────────────────────────────────────── */
    #summary-bar {
      display: none;
      width: min(1200px, 100%);
      margin-top: 16px;
      border: 1.5px solid #000;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }

    .stat-cell {
      padding: 16px 20px;
      border-right: 1px solid #e8e8e8;
    }
    .stat-cell:last-child { border-right: none; }

    .stat-label {
      display: block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 6px;
    }

    .stat-value {
      display: block;
      font-family: 'SF Mono', ui-monospace, 'Fira Code', 'Courier New', monospace;
      font-size: 18px;
      font-weight: 700;
      color: #000;
      line-height: 1.2;
    }

    .stat-sub {
      display: block;
      font-size: 10px;
      color: #aaa;
      margin-top: 3px;
    }

    /* ── Trend panel ────────────────────────────────────────────────────────── */
    #trend-panel {
      display: none;
      width: min(1200px, 100%);
      margin-top: 16px;
      border: 1.5px solid #000;
      padding: 20px 24px 24px;
    }

    #trend-title {
      display: block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #000;
      margin-bottom: 16px;
    }

    #trend-canvas { width: 100%; height: 200px; }

    @media (max-width: 768px) {
      #summary-bar { grid-template-columns: repeat(2, 1fr); }
      .stat-cell:nth-child(2) { border-right: none; }
      .stat-cell:nth-child(3) { border-top: 1px solid #e8e8e8; border-right: 1px solid #e8e8e8; }
      .stat-cell:nth-child(4) { border-top: 1px solid #e8e8e8; }
    }
  </style>
</head>
<body>

  <div id="card">
    <span id="card-label">Wallet Address</span>
    <input
      id="wallet"
      type="text"
      value="FuUKYBncpU3BSJ43hgKigKhzYrigWUEja3n69gzNTxeP"
      spellcheck="false"
      autocomplete="off"
    >
    <button id="enter">Enter</button>
  </div>

  <div id="summary-bar">
    <div class="stat-cell">
      <span class="stat-label">Total Transactions</span>
      <span class="stat-value" id="stat-total">—</span>
      <span class="stat-sub" id="stat-period">—</span>
    </div>
    <div class="stat-cell">
      <span class="stat-label">USD Received</span>
      <span class="stat-value" id="stat-usd-in">—</span>
      <span class="stat-sub">stablecoins only</span>
    </div>
    <div class="stat-cell">
      <span class="stat-label">USD Sent</span>
      <span class="stat-value" id="stat-usd-out">—</span>
      <span class="stat-sub">stablecoins only</span>
    </div>
    <div class="stat-cell">
      <span class="stat-label">Net USD Position</span>
      <span class="stat-value" id="stat-net">—</span>
      <span class="stat-sub" id="stat-tokens">—</span>
    </div>
  </div>

  <div id="panels">
    <div id="terminal">
      <span id="terminal-title">Terminal</span>
      <pre id="output"><span class="muted">Waiting for input...</span></pre>
      <button id="show-all">Show All</button>
    </div>

    <div id="bubble-wrap">
      <span id="bubble-label">Bubble Map</span>
      <div id="bubble-placeholder">Waiting for input...</div>
      <canvas id="bubble-canvas"></canvas>
      <div id="token-detail">
        <div id="token-detail-name"></div>
        <div class="detail-grid" id="token-detail-grid"></div>
      </div>
    </div>
  </div>

  <div id="trend-panel">
    <span id="trend-title">Activity Over Time — Transactions per Month</span>
    <canvas id="trend-canvas"></canvas>
  </div>

  <script>
    const DEFAULT   = 'FuUKYBncpU3BSJ43hgKigKhzYrigWUEja3n69gzNTxeP';
    const input     = document.getElementById('wallet');
    const output    = document.getElementById('output');
    const enterBtn  = document.getElementById('enter');
    const showAllBtn = document.getElementById('show-all');

    let shortContent = '';

    showAllBtn.addEventListener('click', () => {
      if (showAllBtn.textContent === 'Show All') {
        shortContent = output.textContent;
        fetch('/more_transactions')
          .then(r => r.text())
          .then(text => {
            output.textContent += text;
            showAllBtn.textContent = 'Show Less';
          })
          .catch(() => { output.textContent += '\nFailed to load remaining transactions.'; });
      } else {
        output.textContent = shortContent;
        showAllBtn.textContent = 'Show All';
      }
    });

    // ── Input behaviour ──────────────────────────────────────────────────────
    input.addEventListener('focus', () => {
      if (input.value === DEFAULT) input.select();
    });

    input.addEventListener('input', () => {
      input.classList.toggle('active', input.value !== DEFAULT && input.value !== '');
    });

    input.addEventListener('blur', () => {
      if (input.value.trim() === '') {
        input.value = DEFAULT;
        input.classList.remove('active');
      }
    });

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') run();
    });

    enterBtn.addEventListener('click', run);

    // ── SSE streaming ────────────────────────────────────────────────────────
    let activeSource = null;

    function run() {
      const addr = input.value.trim();
      if (!addr) return;

      if (activeSource) { activeSource.close(); activeSource = null; }

      output.textContent = '';
      enterBtn.disabled  = true;
      enterBtn.textContent = 'Running...';
      showAllBtn.style.display = 'none';

      // Reset summary + trend
      document.getElementById('summary-bar').style.display = 'none';
      document.getElementById('trend-panel').style.display = 'none';
      if (trendChart) { trendChart.destroy(); trendChart = null; }

      // Reset bubble map
      if (bubbleRenderer) {
        bubbleAnimating = false;
        bubbleRenderer.dispose();
        bubbleRenderer = null;
      }
      const canvas = document.getElementById('bubble-canvas');
      const placeholder = document.getElementById('bubble-placeholder');
      canvas.style.display      = 'none';
      placeholder.style.display = 'block';
      placeholder.textContent   = 'Waiting for input...';

      const es = new EventSource(`/run?wallet=${encodeURIComponent(addr)}`);
      activeSource = es;

      es.onmessage = e => {
        if (e.data === '[DONE]') {
          es.close();
          activeSource       = null;
          enterBtn.disabled  = false;
          enterBtn.textContent = 'Enter';
          showAllBtn.style.display = 'block';
          fetchTokens();
          fetchSummary();
          fetchTrend();
          return;
        }
        output.textContent += e.data + '\n';
        output.scrollTop    = output.scrollHeight;
      };

      es.onerror = () => {
        es.close();
        activeSource         = null;
        enterBtn.disabled    = false;
        enterBtn.textContent = 'Enter';
        output.textContent  += '\nConnection lost.';
      };
    }
    // ── Bubble chart ─────────────────────────────────────────────────────────
    let bubbleRenderer = null;
    let bubbleAnimating = false;

    let trendChart = null;

    function fetchSummary() {
      fetch('/summary')
        .then(r => r.json())
        .then(s => {
          const net    = s.usd_in - s.usd_out;
          const first  = s.first_txn ? s.first_txn.slice(0, 10) : '—';
          const last   = s.last_txn  ? s.last_txn.slice(0, 10)  : '—';
          const period = first === last ? first : `${first} → ${last}`;

          document.getElementById('stat-total').textContent  = s.total_txns.toLocaleString();
          document.getElementById('stat-period').textContent = period;
          document.getElementById('stat-usd-in').textContent = `$${fmtAmt(s.usd_in)}`;
          document.getElementById('stat-usd-out').textContent = `$${fmtAmt(s.usd_out)}`;
          document.getElementById('stat-net').textContent    = `${net >= 0 ? '+' : ''}$${fmtAmt(net)}`;
          document.getElementById('stat-tokens').textContent = `${s.unique_tokens} unique tokens`;
          document.getElementById('summary-bar').style.display = 'grid';
        })
        .catch(() => {});
    }

    function fetchTrend() {
      fetch('/trend')
        .then(r => r.json())
        .then(rows => {
          if (!rows.length) return;
          const panel = document.getElementById('trend-panel');
          panel.style.display = 'block';

          const labels  = rows.map(r => r.month);
          const txnData = rows.map(r => r.txn_count);
          const inData  = rows.map(r => r.usd_in);
          const outData = rows.map(r => r.usd_out);

          if (trendChart) { trendChart.destroy(); trendChart = null; }

          const ctx = document.getElementById('trend-canvas').getContext('2d');
          trendChart = new Chart(ctx, {
            type: 'bar',
            data: {
              labels,
              datasets: [
                {
                  label: 'Transactions',
                  data: txnData,
                  backgroundColor: '#000',
                  yAxisID: 'yTxn',
                  order: 2,
                },
                {
                  label: 'USD In',
                  data: inData,
                  type: 'line',
                  borderColor: '#555',
                  backgroundColor: 'transparent',
                  pointRadius: 3,
                  tension: 0.3,
                  yAxisID: 'yUSD',
                  order: 1,
                },
                {
                  label: 'USD Out',
                  data: outData,
                  type: 'line',
                  borderColor: '#aaa',
                  backgroundColor: 'transparent',
                  pointRadius: 3,
                  borderDash: [4, 4],
                  tension: 0.3,
                  yAxisID: 'yUSD',
                  order: 1,
                },
              ],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: {
                  labels: { font: { family: 'inherit', size: 10 }, color: '#000' }
                },
              },
              scales: {
                yTxn: {
                  type: 'linear', position: 'left',
                  ticks: { font: { family: 'inherit', size: 10 }, color: '#000' },
                  grid: { color: '#f0f0f0' },
                  title: { display: true, text: 'Transactions', font: { size: 9 }, color: '#aaa' },
                },
                yUSD: {
                  type: 'linear', position: 'right',
                  ticks: {
                    font: { family: 'inherit', size: 10 }, color: '#555',
                    callback: v => `$${fmtAmt(v)}`,
                  },
                  grid: { drawOnChartArea: false },
                  title: { display: true, text: 'USD (stablecoins)', font: { size: 9 }, color: '#aaa' },
                },
                x: {
                  ticks: { font: { family: 'inherit', size: 10 }, color: '#000' },
                  grid: { display: false },
                },
              },
            },
          });
        })
        .catch(() => {});
    }

    function fetchTokens() {
      fetch('/tokens')
        .then(r => r.json())
        .then(tokens => {
          if (tokens.length) renderBubbles(tokens);
        })
        .catch(() => {});
    }

    function renderBubbles(tokens) {
      const placeholder = document.getElementById('bubble-placeholder');
      const canvas      = document.getElementById('bubble-canvas');

      // Clean up previous renderer if re-running
      if (bubbleRenderer) {
        bubbleAnimating = false;
        bubbleRenderer.dispose();
        bubbleRenderer = null;
      }

      placeholder.style.display = 'none';
      canvas.style.display      = 'block';

      const W = document.getElementById('bubble-wrap').clientWidth;
      const H = 500;

      const scene    = new THREE.Scene();
      scene.background = new THREE.Color(0xffffff);

      const camera   = new THREE.PerspectiveCamera(60, W / H, 0.1, 500);

      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setSize(W, H);
      renderer.setPixelRatio(window.devicePixelRatio);
      bubbleRenderer = renderer;

      scene.add(new THREE.AmbientLight(0xffffff, 1));
      const dir = new THREE.DirectionalLight(0xffffff, 0.4);
      dir.position.set(5, 10, 5);
      scene.add(dir);

      const controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping  = true;
      controls.dampingFactor  = 0.05;
      controls.autoRotate     = true;
      controls.autoRotateSpeed = 0.6;

      const maxCount = Math.max(...tokens.map(t => t.count)) || 1;
      const minSize  = 0.5;
      const maxSize  = 2.0;

      // Ring radius large enough that adjacent bubbles never touch
      const gap  = 0.5;
      const ring = tokens.length > 1
        ? Math.max(10, (maxSize + gap) / Math.sin(Math.PI / tokens.length))
        : 10;

      camera.position.set(0, ring * 0.35, ring * 1.9);

      const clickableMeshes = [];
      const meshTokenMap    = new Map();

      tokens.forEach((token, i) => {
        const angle   = (i / tokens.length) * Math.PI * 2;
        const size    = minSize + (token.count / maxCount) * (maxSize - minSize);
        const isKnown = token.token in SYMBOL_TO_MINT || STABLECOINS.has(token.token);

        // Fill sphere — grey for known tokens, light amber tint for unidentified
        const geo  = new THREE.SphereGeometry(size, 32, 32);
        const mat  = new THREE.MeshStandardMaterial({
          color:     isKnown ? 0xf2f2f2 : 0xfff3e0,
          roughness: isKnown ? 0.6 : 0.8,
          metalness: 0,
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(Math.cos(angle) * ring, 0, Math.sin(angle) * ring);
        scene.add(mesh);
        clickableMeshes.push(mesh);
        meshTokenMap.set(mesh.uuid, token.token);

        // Wireframe overlay — more visible for unknown tokens
        const wfMat  = new THREE.MeshBasicMaterial({
          color:       0x000000,
          wireframe:   true,
          transparent: true,
          opacity:     isKnown ? 0.12 : 0.25,
        });
        const wfMesh = new THREE.Mesh(new THREE.SphereGeometry(size * 1.002, 16, 16), wfMat);
        wfMesh.position.copy(mesh.position);
        scene.add(wfMesh);

        // Label sprite
        const label = makeLabel(token.token, token.count);
        label.position.set(mesh.position.x, mesh.position.y + size + 0.6, mesh.position.z);
        scene.add(label);
      });

      // Click to drill down
      const raycaster = new THREE.Raycaster();
      canvas.addEventListener('click', e => {
        const rect  = canvas.getBoundingClientRect();
        const mouse = new THREE.Vector2(
          ((e.clientX - rect.left)  / rect.width)  *  2 - 1,
          ((e.clientY - rect.top)   / rect.height) * -2 + 1
        );
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObjects(clickableMeshes);
        if (hits.length > 0) {
          fetchTokenDetail(meshTokenMap.get(hits[0].object.uuid));
        }
      });

      bubbleAnimating = true;
      (function animate() {
        if (!bubbleAnimating) return;
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      })();

      window.addEventListener('resize', () => {
        const nW = document.getElementById('bubble-wrap').clientWidth;
        camera.aspect = nW / H;
        camera.updateProjectionMatrix();
        renderer.setSize(nW, H);
      });
    }

    function fmtAmt(val) {
      const abs  = Math.abs(val);
      const sign = val < 0 ? '-' : '';
      if (abs >= 1e9) return sign + (abs / 1e9).toFixed(2) + 'B';
      if (abs >= 1e6) return sign + (abs / 1e6).toFixed(2) + 'M';
      return sign + abs.toLocaleString('en-US', { maximumFractionDigits: 2 });
    }

    const STABLECOINS = new Set(['USDC', 'USDT', 'USDH']);

    const SYMBOL_TO_MINT = {
      'wSOL':    'So11111111111111111111111111111111111111112',
      'USDC':    'EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v',
      'USDT':    'Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB',
      'USDH':    'USDH1Hdt8P7qTQKDSpeZDnDRKqTucBM5ciqMP2kYtAf',
      'BONK':    'DezXAZ8z7PnrnRJjz3Fh4Cz9WcbQTUk2e37hTd5C59w',
      'JUP':     'JUPyiwrYJFskUPiHa7hkeR8VUtAeFoSYbKedZNsDvCN',
      'JitoSOL': 'J1toso1uCk3RLmjorhTtrVwY9HJ7X8V9yYac6Y7kGCPn',
      'mSOL':    'mSoLzYCxNqgBJwTfMxKWR7fmDjnZ7HepfsSwnYwbsR',
      'bSOL':    'bSo13r4TkiE4G6HUPZepS9z6E6T8Jq3EqW3eJ5W2RCP',
      'RAY':     '4k3Dyjzvzp8eMZWUXbBCjEvwSkkk59S5iCNLY3QrkX6R',
      'ORCA':    'orcaEKTdK7LKz57vaAYfXqXbUQmNEw4RkY7qR9VYkq',
      'WIF':     'EKpQGSJtjMFqKZ9KQanSqYXRcF8fBopzLHYxdM65zcjm',
      'MYRO':    'HhJpBhZc3L4QxrzBFW91tYYQJgWPs2F7GQZpkz7g5Xtg',
      'SAMO':    '7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgTL',
    };

    function fetchTokenDetail(tokenName) {
      Promise.all([
        fetch(`/token_detail?token=${encodeURIComponent(tokenName)}`).then(r => r.json()),
        fetch('/prices').then(r => r.json()).catch(() => ({}))
      ]).then(([d, prices]) => {
          const net       = d.total_in - d.total_out;
          const totalVol  = d.total_in + d.total_out;
          const totalTxns = d.count_in + d.count_out;
          const first     = d.first_seen.slice(0, 10);
          const last      = d.last_seen.slice(0, 10);
          const dateRange = first === last ? first : `${first} → ${last}`;
          const isUSD     = STABLECOINS.has(d.token);
          const sym       = isUSD ? '$' : '';
          const price     = isUSD ? 1 : (prices[d.token] || null);

          // Format amount with optional USD equivalent
          function fmtWithUSD(amount) {
            const base = `${sym}${fmtAmt(amount)}`;
            if (!isUSD && price) {
              return `${base} <span style="color:#aaa">≈ $${fmtAmt(amount * price)}</span>`;
            }
            return base;
          }

          // Direction label
          let direction;
          if      (d.count_in === 0 && d.count_out > 0) direction = 'Spending Only';
          else if (d.count_in > 0 && d.count_out === 0) direction = 'Receiving Only';
          else if (net > 0)                              direction = 'Net Accumulator';
          else if (net < 0)                              direction = 'Net Spender';
          else                                           direction = 'Balanced';

          // Activity mix
          const swapCount     = (d.types.find(t => t.type === 'SWAP')     || {count: 0}).count;
          const transferCount = (d.types.find(t => t.type === 'TRANSFER') || {count: 0}).count;
          const swapPct       = totalTxns > 0 ? swapCount / totalTxns : 0;
          const transferPct   = totalTxns > 0 ? transferCount / totalTxns : 0;
          const sameDay       = first === last;

          // Build plain-English narrative
          const sentences = [];

          // What is this token?
          if (isUSD) {
            sentences.push(`${d.token} is a digital dollar — each unit = $1.`);
          } else if (price) {
            sentences.push(`${d.token} is a cryptocurrency worth ~$${fmtAmt(price)} per token.`);
          } else {
            sentences.push(`${d.token} is an unidentified token — likely a meme coin with no trackable price.`);
          }

          // What did the wallet do?
          if (d.count_in === 0) {
            if (swapPct > 0.8) {
              sentences.push(`The wallet traded away all of its ${d.token} across ${d.count_out} swaps — never receiving any back.`);
            } else {
              sentences.push(`The wallet only sent ${d.token} out (${d.count_out} transactions) — never received any.`);
            }
          } else if (d.count_out === 0) {
            if (swapPct > 0.8) {
              sentences.push(`The wallet only acquired ${d.token} by trading into it (${d.count_in} swaps) — never sold any.`);
            } else {
              sentences.push(`The wallet only received ${d.token} (${d.count_in} transactions) — never sent any out.`);
            }
          } else {
            const netUSDStr = price ? ` (~$${fmtAmt(Math.abs(net) * price)})` : '';
            if (net > 0) {
              sentences.push(`Net receiver — ended up with ${fmtAmt(net)} more ${d.token}${netUSDStr} than it sent across ${totalTxns} transactions.`);
            } else {
              sentences.push(`Net spender — sent ${fmtAmt(Math.abs(net))} more ${d.token}${netUSDStr} than it received across ${totalTxns} transactions.`);
            }
          }

          // Context
          if (sameDay && totalTxns >= 10 && swapPct > 0.8 && d.count_in === 0) {
            sentences.push(`${totalTxns} sell trades in one day (${first}) — likely a deliberate exit, cashing out the entire position at once.`);
          } else if (sameDay && totalTxns >= 5) {
            sentences.push(`All activity on one day (${first}) — a one-time event, not regular use.`);
          } else if (!sameDay && swapPct > 0.8) {
            sentences.push(`All swaps — purely a trading asset, never used as a payment.`);
          } else if (!sameDay && transferPct > 0.7) {
            sentences.push(`Mostly wallet-to-wallet transfers — used more like payments than trading.`);
          } else if (!sameDay) {
            sentences.push(`Activity spread over multiple days — part of the wallet's regular habits.`);
          }

          const narrative = sentences.join(' ');

          // Activity breakdown with percentages
          const types = d.types.map(t => {
            const pct = totalTxns > 0 ? Math.round((t.count / totalTxns) * 100) : 0;
            return `${t.type} ${pct}%`;
          }).join(' · ');

          // Net position formatting
          const netSign  = net >= 0 ? '+' : '-';
          const netAbs   = Math.abs(net);
          const netBase  = `${netSign}${sym}${fmtAmt(netAbs)}`;
          const netUSD   = (!isUSD && price) ? ` <span style="color:#aaa">≈ ${net >= 0 ? '+' : '-'}$${fmtAmt(netAbs * price)}</span>` : '';

          let rows = '';
          rows += `<span style="grid-column:1/-1;font-family:inherit;font-size:11px;color:#555;padding-bottom:8px;line-height:1.7">${narrative}</span>`;
          rows += `<span style="grid-column:1/-1;border-top:1px solid #e8e8e8;margin-bottom:4px"></span>`;
          if (d.count_in  > 0) rows += `<span class="label">Money in</span><span class="value">${fmtWithUSD(d.total_in)} <span style="color:#aaa">(${d.count_in} txns)</span></span>`;
          if (d.count_out > 0) rows += `<span class="label">Money out</span><span class="value">${fmtWithUSD(d.total_out)} <span style="color:#aaa">(${d.count_out} txns)</span></span>`;
          rows += `<span class="label">Net position</span><span class="value" style="font-weight:600">${netBase}${netUSD}</span>`;
          rows += `<span class="label">Active</span><span class="value">${dateRange}</span>`;
          rows += `<span class="label">Activity</span><span class="value">${types}</span>`;
          const fullMint  = SYMBOL_TO_MINT[d.token] || null;
          const addrText  = fullMint || d.token;
          const addrNote  = fullMint
            ? `<span style="color:#aaa;font-size:10px"> (full mint address)</span>`
            : `<span style="color:#aaa;font-size:10px"> (truncated — full address unavailable)</span>`;
          rows += `<span class="label">Address</span><span class="value" style="line-height:1.8">
            <span style="word-break:break-all;font-size:11px">${addrText}</span>${addrNote}<br>
            <button onclick="copyTokenAddr(this)" data-addr="${addrText}" style="margin-top:6px;background:#000;color:#fff;border:none;font-family:inherit;font-size:9px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;padding:5px 14px;cursor:pointer">Copy address</button>
          </span>`;

          document.getElementById('token-detail-name').innerHTML =
            `${d.token} <span style="font-size:10px;font-weight:400;color:#999;text-transform:uppercase;letter-spacing:0.1em;margin-left:8px">${direction}</span>`;
          document.getElementById('token-detail-grid').innerHTML = rows;
          document.getElementById('token-detail').style.display = 'block';
        })
        .catch(() => {});
    }

    function copyTokenAddr(btn) {
      const text = btn.getAttribute('data-addr');
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = 'Copied!';
        btn.style.background = '#555';
        setTimeout(() => {
          btn.textContent = 'Copy address';
          btn.style.background = '#000';
        }, 1500);
      }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        btn.textContent = 'Copied!';
        btn.style.background = '#555';
        setTimeout(() => {
          btn.textContent = 'Copy address';
          btn.style.background = '#000';
        }, 1500);
      });
    }

    function makeLabel(name, count) {
      const c   = document.createElement('canvas');
      c.width   = 256;
      c.height  = 80;
      const ctx = c.getContext('2d');

      // Shorten long addresses (full mints are 44 chars) for display
      const displayName = name.length > 12 ? name.slice(0, 6) + '…' + name.slice(-4) : name;

      ctx.font      = 'bold 30px sans-serif';
      ctx.fillStyle = '#000000';
      ctx.textAlign = 'center';
      ctx.fillText(displayName, 128, 34);

      ctx.font      = '20px sans-serif';
      ctx.fillStyle = '#777777';
      ctx.fillText(`${count} txns`, 128, 60);

      const tex    = new THREE.CanvasTexture(c);
      const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true }));
      sprite.scale.set(3.2, 1, 1);
      return sprite;
    }
  </script>
</body>
